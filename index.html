        // ============== CLOUD API ==============
        // Project: lljnruyhireravkxtxrz.supabase.co
        // Publishable key is safe to ship to clients — anyone calling the

        const SUPABASE_URL = 'https://lljnruyhireravkxtxrz.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_bgQYbx8tUxVwKTHlUQmsiA__5lCQymj';
        const FUNCTION_URL = `${SUPABASE_URL}/functions/v1/data`;

        const apiCall = async (resource, action, payload = null) => {
            const password = localStorage.getItem(PW_STORAGE_KEY);
            if (!password) throw new Error('NO_PASSWORD');

            const res = await fetch(FUNCTION_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'apikey': SUPABASE_ANON_KEY,
                    'x-password': password,
                },
                body: JSON.stringify({ resource, action, payload }),
            });
            if (res.status === 401) {
                localStorage.removeItem(PW_STORAGE_KEY);
                throw new Error('WRONG_PASSWORD');
            }
            if (!res.ok) {
                const txt = await res.text().catch(() => '');
                throw new Error(`API_ERROR_${res.status}: ${txt}`);
            }
            return await res.json();
        };

        // DB ↔ JS naming adapters (Postgres uses snake_case, JS uses camelCase)
        const toDbDesign = (d) => ({
            id: String(d.id),
            platform_id: d.platformId,
            format_id: d.formatId,
            content: d.content,
            style: d.style,
            date: d.date,
        });
        const fromDbDesign = (d) => ({
            id: d.id,
            platformId: d.platform_id,
            formatId: d.format_id,
            content: d.content,
            style: d.style,
            date: d.date,
        });
        const toDbKit = (k) => ({
            id: String(k.id),
            name: k.name,
            sender_name: k.senderName,
            url: k.url,
            verified: !!k.verified,
            avatar: k.avatar,
        });
        const fromDbKit = (k) => ({
            id: k.id,
            name: k.name,
            senderName: k.sender_name,
            url: k.url,
            verified: !!k.verified,
            avatar: k.avatar,
            date: k.created_at ? new Date(k.created_at).toLocaleDateString('nl-NL') : '',
        });

        // ============== HELPERS ==============
        const wrapText = (ctx, text, maxWidth) => {
            const paragraphs = String(text ?? '').split('\n');
            const lines = [];
            for (const para of paragraphs) {
                if (para === '') { lines.push(''); continue; }
                const words = para.split(' ');
                let line = words[0] ?? '';
                for (let i = 1; i < words.length; i++) {
                    const w = words[i];
                    if (ctx.measureText(line + ' ' + w).width < maxWidth) line += ' ' + w;
                    else { lines.push(line); line = w; }
                }
                lines.push(line);
            }
            return lines;
        };

        const loadImg = (src) => new Promise((res, rej) => {
            const i = new Image();
            i.onload = () => res(i);
            i.onerror = rej;
            i.src = src;
        });

        const truncateToWidth = (ctx, text, maxW, fontStr) => {
            ctx.font = fontStr;
            if (ctx.measureText(text).width <= maxW) return text;
            let t = text;
            while (t.length > 0 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
            return t + '…';
        };

        // Resize images larger than 1500px on the long side so the JSON
        // payload stays under Supabase's Edge Function body limit (~6 MB).
        // Original format is preserved (PNG keeps transparency for logos).
        const fileToImageData = (file) => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const MAX = 1500;
                    let w = img.naturalWidth, h = img.naturalHeight;
                    const longest = Math.max(w, h);
                    if (longest <= MAX) {
                        return res({ src: e.target.result, width: w, height: h });
                    }
                    const scale = MAX / longest;
                    w = Math.round(w * scale);
                    h = Math.round(h * scale);
                    const c = document.createElement('canvas');
                    c.width = w; c.height = h;
                    const cx = c.getContext('2d');
                    cx.drawImage(img, 0, 0, w, h);
                    const isJpeg = file.type === 'image/jpeg' || file.type === 'image/jpg';
                    const mime = isJpeg ? 'image/jpeg' : 'image/png';
                    const compressed = isJpeg ? c.toDataURL(mime, 0.85) : c.toDataURL(mime);
                    res({ src: compressed, width: w, height: h });
                };
                img.onerror = rej;
                img.src = e.target.result;
            };
            reader.onerror = rej;
            reader.readAsDataURL(file);
        });

        // ============== CANVAS ICON DRAWING ==============
        const drawHeart = (ctx, cx, cy, r, color, filled = true) => {
            ctx.save();
            ctx.fillStyle = filled ? color : 'transparent';
            ctx.strokeStyle = color;
            ctx.lineWidth = r * 0.18;
            const tx = cx, ty = cy - r * 0.3;
            ctx.beginPath();
            ctx.moveTo(tx, ty + r * 0.4);
            ctx.bezierCurveTo(tx, ty, tx - r, ty, tx - r, ty + r * 0.6);
            ctx.bezierCurveTo(tx - r, ty + r, tx, ty + r * 1.5, tx, ty + r * 1.7);
            ctx.bezierCurveTo(tx, ty + r * 1.5, tx + r, ty + r, tx + r, ty + r * 0.6);
            ctx.bezierCurveTo(tx + r, ty, tx, ty, tx, ty + r * 0.4);
            ctx.closePath();
            if (filled) ctx.fill(); else ctx.stroke();
            ctx.restore();
        };

        const drawComment = (ctx, cx, cy, r, color) => {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = r * 0.18;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(cx - r * 0.3, cy + r * 0.4);
            ctx.lineTo(cx - r * 0.5, cy + r * 1.3);
            ctx.lineTo(cx + r * 0.4, cy + r * 0.7);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        };

        const drawShare = (ctx, cx, cy, r, color) => {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = r * 0.18;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(cx + r, cy - r);
            ctx.lineTo(cx - r, cy);
            ctx.lineTo(cx + r * 0.1, cy + r * 0.3);
            ctx.lineTo(cx + r, cy - r);
            ctx.closePath();
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx + r * 0.1, cy + r * 0.3);
            ctx.lineTo(cx + r * 0.3, cy + r);
            ctx.stroke();
            ctx.restore();
        };

        const drawBookmark = (ctx, cx, cy, r, color) => {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = r * 0.18;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(cx - r * 0.7, cy - r);
            ctx.lineTo(cx - r * 0.7, cy + r);
            ctx.lineTo(cx, cy + r * 0.4);
            ctx.lineTo(cx + r * 0.7, cy + r);
            ctx.lineTo(cx + r * 0.7, cy - r);
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
        };

        const drawVerified = (ctx, x, y, r) => {
            ctx.save();
            ctx.fillStyle = '#1d9bf0';
            ctx.beginPath();
            ctx.arc(x + r, y + r, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = r * 0.32;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(x + r * 0.55, y + r * 1.0);
            ctx.lineTo(x + r * 0.9, y + r * 1.35);
            ctx.lineTo(x + r * 1.45, y + r * 0.7);
            ctx.stroke();
            ctx.restore();
        };

        // ============== ICONS (REACT) ==============
        const Icons = {

            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Image: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
            Save: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>,
            Heart: ({ size = 22, fill = 'none' }) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
            Comment: ({ size = 22 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
            Share: ({ size = 22 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            Bookmark: ({ size = 22 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>,
            Verified: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="#1d9bf0"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z"/></svg>,
            Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>,
            Briefcase: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            Package: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="16.5" x2="7.5" y1="9.4" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></svg>,
        };

        // ============== LAYOUT METRICS ==============
        // Returns { phoneHeight, imgHeight } for given layout config
        function computeMetrics({ platform, format, content, phoneW, sliderH }) {
            if (platform.layout === 'story') {
                return { phoneHeight: sliderH, imgHeight: sliderH };
            }

            const imgAspect = content.mainImage
                ? content.mainImage.height / content.mainImage.width
                : format.imgAspect;
            const imgH = phoneW * imgAspect;

            const measureCanvas = document.createElement('canvas');
            const mctx = measureCanvas.getContext('2d');
            const safePadX = 20, lineHeight = 20, fontSize = 14;

            if (platform.layout === 'feed-cta') {
                const topSpace = 50, headerOffset = 70, gap = 10, footerH = 80, buffer = 4;
                mctx.font = `400 ${fontSize}px "Inter", sans-serif`;
                const lines = wrapText(mctx, content.text, phoneW - safePadX * 2);
                const textH = lines.length * lineHeight;
                const contentH = topSpace + headerOffset + textH + gap + imgH + footerH + buffer;
                return { phoneHeight: Math.max(sliderH, Math.ceil(contentH)), imgHeight: imgH };
            }

            if (platform.layout === 'feed-icons') {
                const topSpace = 50, headerOffset = 60, iconRowH = 50, likesH = 22, gap = 6, buffer = 12;
                mctx.font = `400 12px "Inter", sans-serif`;
                const captionLines = wrapText(mctx, content.name + ' ' + content.text, phoneW - safePadX * 2);
                const captionH = captionLines.length * 18;
                const contentH = topSpace + headerOffset + imgH + iconRowH + likesH + gap + captionH + buffer;
                return { phoneHeight: Math.max(sliderH, Math.ceil(contentH)), imgHeight: imgH };
            }

            return { phoneHeight: sliderH, imgHeight: imgH };
        }

        // ============== CANVAS RENDERERS ==============
        async function renderFeedCTA(ctx, p) {
            const { scale, phoneX, phoneY, phoneW, safeX, safeW, content, platform, darkMode, imgH, fontBold, fontReg } = p;
            let currentY = p.currentY;

            const headerOffset = 70 * scale;
            const avatarSize = 40 * scale;
            const mainImg = content.mainImage ? await loadImg(content.mainImage.src) : null;
            const avatarImg = content.avatar ? await loadImg(content.avatar.src) : null;

            // Avatar
            ctx.save();
            ctx.beginPath();
            if (platform.avatarShape === 'circle') {
                ctx.arc(safeX + avatarSize / 2, currentY + avatarSize / 2, avatarSize / 2, 0, Math.PI * 2);
            } else {
                const r = 8 * scale;
                if (ctx.roundRect) ctx.roundRect(safeX, currentY, avatarSize, avatarSize, r);
                else ctx.rect(safeX, currentY, avatarSize, avatarSize);
            }
            ctx.closePath();
            ctx.clip();
            if (avatarImg) ctx.drawImage(avatarImg, safeX, currentY, avatarSize, avatarSize);
            else { ctx.fillStyle = '#ccc'; ctx.fillRect(safeX, currentY, avatarSize, avatarSize); }
            ctx.restore();

            // Name + verified
            ctx.fillStyle = darkMode ? '#fff' : '#000';
            ctx.font = fontBold(14);
            ctx.textAlign = 'left';
            const nameX = safeX + avatarSize + 10 * scale;
            ctx.fillText(content.name, nameX, currentY + 15 * scale);
            if (content.verified) {
                const nameW = ctx.measureText(content.name).width;
                drawVerified(ctx, nameX + nameW + 4 * scale, currentY + 4 * scale, 7 * scale);
            }

            ctx.fillStyle = '#a1a1aa';
            ctx.font = fontReg(11);
            ctx.fillText(`${platform.sponsorLabel} • 2u`, nameX, currentY + 32 * scale);

            ctx.fillStyle = darkMode ? '#fff' : '#000';
            ctx.font = fontBold(14);
            ctx.fillText('...', phoneX + phoneW - 30 * scale, currentY + 20 * scale);

            currentY += headerOffset;

            // Post text
            ctx.fillStyle = darkMode ? '#fff' : '#18181b';
            ctx.font = fontReg(14);
            const lineHeight = 20 * scale;
            const textLines = wrapText(ctx, content.text, safeW);
            for (const ln of textLines) {
                ctx.fillText(ln, safeX, currentY);
                currentY += lineHeight;
            }
            currentY += 10 * scale;

            // Image
            if (mainImg) ctx.drawImage(mainImg, phoneX, currentY, phoneW, imgH);
            else { ctx.fillStyle = '#27272a'; ctx.fillRect(phoneX, currentY, phoneW, imgH); }
            currentY += imgH;

            // Footer block
            const footerH = 80 * scale;
            ctx.fillStyle = darkMode ? '#27272a' : '#f4f4f5';
            ctx.fillRect(phoneX, currentY, phoneW, footerH);

            // Button (auto-sized to text)
            ctx.font = fontBold(12);
            const btnPadX = 12 * scale;
            const btnTextW = ctx.measureText(content.buttonText).width;
            const btnW = btnTextW + btnPadX * 2;
            const btnH = 32 * scale;
            const btnX = phoneX + phoneW - 20 * scale - btnW;
            const btnY = currentY + (footerH - btnH) / 2;

            const textMaxW = btnX - safeX - 12 * scale;

            // Headline + URL with truncation
            ctx.fillStyle = darkMode ? '#fff' : '#000';
            ctx.textAlign = 'left';
            ctx.fillText(truncateToWidth(ctx, content.headline, textMaxW, fontBold(13)), safeX, currentY + 30 * scale);
            ctx.fillStyle = '#71717a';
            ctx.fillText(truncateToWidth(ctx, content.url, textMaxW, fontReg(11)), safeX, currentY + 50 * scale);

            // Button background
            const bs = platform.buttonStyle;
            if (bs.bg !== 'transparent') {
                ctx.fillStyle = bs.bg;
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 4 * scale);
                else ctx.rect(btnX, btnY, btnW, btnH);
                ctx.fill();
            }
            if (bs.border !== 'transparent') {
                ctx.strokeStyle = bs.border;
                ctx.lineWidth = 1.5 * scale;
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 4 * scale);
                else ctx.rect(btnX, btnY, btnW, btnH);
                ctx.stroke();
            }

            ctx.fillStyle = bs.text;
            ctx.font = fontBold(12);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(content.buttonText, btnX + btnW / 2, btnY + btnH / 2);
            ctx.textBaseline = 'alphabetic';
        }

        async function renderFeedIcons(ctx, p) {
            const { scale, phoneX, phoneY, phoneW, safeX, safeW, content, platform, darkMode, imgH, fontBold, fontReg } = p;
            let currentY = p.currentY;

            const headerOffset = 60 * scale;
            const avatarSize = 36 * scale;
            const mainImg = content.mainImage ? await loadImg(content.mainImage.src) : null;
            const avatarImg = content.avatar ? await loadImg(content.avatar.src) : null;

            // Header avatar
            ctx.save();
            ctx.beginPath();
            ctx.arc(safeX + avatarSize / 2, currentY + avatarSize / 2, avatarSize / 2, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            if (avatarImg) ctx.drawImage(avatarImg, safeX, currentY, avatarSize, avatarSize);
            else { ctx.fillStyle = '#ccc'; ctx.fillRect(safeX, currentY, avatarSize, avatarSize); }
            ctx.restore();

            // Name + verified
            ctx.fillStyle = darkMode ? '#fff' : '#000';
            ctx.font = fontBold(13);
            ctx.textAlign = 'left';
            const nameX = safeX + avatarSize + 10 * scale;
            ctx.fillText(content.name, nameX, currentY + 14 * scale);
            if (content.verified) {
                const nameW = ctx.measureText(content.name).width;
                drawVerified(ctx, nameX + nameW + 4 * scale, currentY + 3 * scale, 6 * scale);
            }

            ctx.fillStyle = '#a1a1aa';
            ctx.font = fontReg(10);
            ctx.fillText(platform.sponsorLabel, nameX, currentY + 28 * scale);

            ctx.fillStyle = darkMode ? '#fff' : '#000';
            ctx.font = fontBold(14);
            ctx.fillText('...', phoneX + phoneW - 30 * scale, currentY + 18 * scale);

            currentY += headerOffset;

            // Image (full width, height per format)
            if (mainImg) ctx.drawImage(mainImg, phoneX, currentY, phoneW, imgH);
            else { ctx.fillStyle = '#27272a'; ctx.fillRect(phoneX, currentY, phoneW, imgH); }
            currentY += imgH;

            // Icon row
            const iconRowH = 50 * scale;
            const iconY = currentY + iconRowH / 2;
            const iconColor = darkMode ? '#fff' : '#000';
            const iconR = 11 * scale;

            drawHeart(ctx, safeX + iconR, iconY, iconR, iconColor, false);
            drawComment(ctx, safeX + iconR + 30 * scale, iconY, iconR, iconColor);
            drawShare(ctx, safeX + iconR + 60 * scale, iconY, iconR, iconColor);
            drawBookmark(ctx, phoneX + phoneW - 22 * scale, iconY, iconR, iconColor);

            currentY += iconRowH;

            // Likes count
            ctx.fillStyle = darkMode ? '#fff' : '#000';
            ctx.font = fontBold(12);
            ctx.textAlign = 'left';
            ctx.fillText(`${(content.likes ?? 0).toLocaleString('nl-NL')} vind-ik-leuks`, safeX, currentY + 8 * scale);
            currentY += 22 * scale;

            // Caption (name bold + text)
            ctx.font = fontReg(12);
            const capLineH = 18 * scale;

            // First line: name bold + text continuation
            ctx.font = fontBold(12);
            const nameWidth = ctx.measureText(content.name).width;
            ctx.fillStyle = darkMode ? '#fff' : '#000';
            ctx.fillText(content.name, safeX, currentY);
            const remainingX = safeX + nameWidth + (4 * scale);
            const remainingW = phoneW - 40 * scale - nameWidth - (4 * scale);

            ctx.font = fontReg(12);
            // Wrap remaining text on first line + subsequent full-width lines
            const words = content.text.split(' ');
            let firstLine = '';
            let i = 0;
            for (; i < words.length; i++) {
                const test = firstLine ? firstLine + ' ' + words[i] : words[i];
                if (ctx.measureText(test).width > remainingW) break;
                firstLine = test;
            }
            ctx.fillText(firstLine, remainingX, currentY);
            currentY += capLineH;

            // Remaining words wrap to safeW
            if (i < words.length) {
                const rest = words.slice(i).join(' ');
                const restLines = wrapText(ctx, rest, safeW);
                for (const ln of restLines) {
                    ctx.fillText(ln, safeX, currentY);
                    currentY += capLineH;
                }
            }

            // "Bekijk alle X reacties" (if any)
            if ((content.comments ?? 0) > 0) {
                currentY += 2 * scale;
                ctx.fillStyle = '#71717a';
                ctx.font = fontReg(11);
                ctx.fillText(`Bekijk alle ${content.comments} reacties`, safeX, currentY);
            }
        }

        async function renderStory(ctx, p) {
            const { scale, phoneX, phoneY, phoneW, phoneH, safeX, content, platform, fontBold, fontReg } = p;
            const mainImg = content.mainImage ? await loadImg(content.mainImage.src) : null;
            const avatarImg = content.avatar ? await loadImg(content.avatar.src) : null;

            if (mainImg) {
                const ratio = mainImg.width / mainImg.height;
                const targetRatio = phoneW / phoneH;
                let sw, sh, sx, sy;
                if (ratio > targetRatio) { sh = mainImg.height; sw = sh * targetRatio; sy = 0; sx = (mainImg.width - sw) / 2; }
                else { sw = mainImg.width; sh = sw / targetRatio; sx = 0; sy = (mainImg.height - sh) / 2; }
                ctx.drawImage(mainImg, sx, sy, sw, sh, phoneX, phoneY, phoneW, phoneH);
            } else {
                ctx.fillStyle = '#27272a';
                ctx.fillRect(phoneX, phoneY, phoneW, phoneH);
            }

            // Bottom gradient overlay
            const grd = ctx.createLinearGradient(0, phoneY + phoneH / 2, 0, phoneY + phoneH);
            grd.addColorStop(0, 'transparent');
            grd.addColorStop(1, 'rgba(0,0,0,0.8)');
            ctx.fillStyle = grd;
            ctx.fillRect(phoneX, phoneY + phoneH / 2, phoneW, phoneH / 2);

            // Top: avatar + name
            const avatarSize = 32 * scale;
            const topY = phoneY + 50 * scale;

            ctx.save();
            ctx.beginPath();
            ctx.arc(safeX + avatarSize / 2, topY + avatarSize / 2, avatarSize / 2, 0, Math.PI * 2);
            ctx.clip();
            if (avatarImg) ctx.drawImage(avatarImg, safeX, topY, avatarSize, avatarSize);
            else { ctx.fillStyle = '#ccc'; ctx.fillRect(safeX, topY, avatarSize, avatarSize); }
            ctx.restore();

            ctx.fillStyle = '#fff';
            ctx.font = fontBold(13);
            ctx.textAlign = 'left';
            const nameX = safeX + avatarSize + 10 * scale;
            ctx.fillText(content.name, nameX, topY + 20 * scale);
            if (content.verified) {
                const nameW = ctx.measureText(content.name).width;
                drawVerified(ctx, nameX + nameW + 4 * scale, topY + 9 * scale, 6 * scale);
            }
            ctx.font = fontReg(11);
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.fillText(platform.sponsorLabel, nameX, topY + 36 * scale);

            // Side icons
            const iconX = phoneX + phoneW - 30 * scale;
            const iconYStart = phoneY + phoneH - 160 * scale;
            const iconGap = 50 * scale;
            const iconR = 12 * scale;

            drawHeart(ctx, iconX, iconYStart, iconR, '#fff', false);
            ctx.fillStyle = '#fff';
            ctx.font = fontReg(11);
            ctx.textAlign = 'center';
            ctx.fillText((content.likes ?? 0).toLocaleString('nl-NL'), iconX, iconYStart + 22 * scale);

            drawComment(ctx, iconX, iconYStart + iconGap, iconR, '#fff');
            ctx.fillText((content.comments ?? 0).toString(), iconX, iconYStart + iconGap + 22 * scale);

            drawShare(ctx, iconX, iconYStart + iconGap * 2, iconR, '#fff');
            ctx.fillText((content.shares ?? 0).toString(), iconX, iconYStart + iconGap * 2 + 22 * scale);

            // CTA pill at the bottom
            const ctaW = phoneW - 40 * scale;
            const ctaH = 36 * scale;
            const ctaX = phoneX + 20 * scale;
            const ctaY = phoneY + phoneH - 56 * scale;
            const bs = platform.buttonStyle;
            ctx.fillStyle = bs.bg === 'transparent' ? '#fff' : bs.bg;
            ctx.beginPath();
            if (ctx.roundRect) ctx.roundRect(ctaX, ctaY, ctaW, ctaH, 6 * scale);
            else ctx.rect(ctaX, ctaY, ctaW, ctaH);
            ctx.fill();

            ctx.fillStyle = bs.text;
            ctx.font = fontBold(13);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(content.buttonText, ctaX + ctaW / 2, ctaY + ctaH / 2);
            ctx.textBaseline = 'alphabetic';
        }

        // ============== PASSWORD GATE ==============
        function PasswordGate({ onAuthed }) {
            const [pw, setPw] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const submit = async (e) => {
                e.preventDefault();
                if (!pw) return;
                setLoading(true);
                setError('');
                localStorage.setItem(PW_STORAGE_KEY, pw);
                try {
                    await apiCall('designs', 'list');
                    onAuthed();
                } catch (err) {
                    localStorage.removeItem(PW_STORAGE_KEY);
                    if (err.message === 'WRONG_PASSWORD') setError('Onjuist wachtwoord.');
                    else setError('Kan geen verbinding maken: ' + err.message);
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-dark-900 flex items-center justify-center z-50 p-4">
                    <form onSubmit={submit} className="bg-dark-800 p-8 rounded-2xl border border-white/10 w-full max-w-sm space-y-4 shadow-2xl">
                        <div>
                            <h1 className="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">SocialFrame v2</h1>
                            <p className="text-sm text-gray-400 mt-1">Voer het team-wachtwoord in om bij de cloud-bibliotheek te komen.</p>
                        </div>
                        <input
                            type="password"
                            value={pw}
                            onChange={e => setPw(e.target.value)}
                            className="w-full bg-dark-900 border border-gray-700 rounded px-3 py-2.5 text-sm focus:border-blue-500 outline-none"
                            placeholder="Wachtwoord"
                            autoFocus
                        />
                        {error && <p className="text-xs text-red-400">{error}</p>}
                        <button type="submit" disabled={loading || !pw}
                            className="w-full bg-white text-black font-bold py-2.5 rounded-lg hover:bg-gray-200 disabled:opacity-50">
                            {loading ? 'Verifiëren…' : 'Inloggen'}
                        </button>
                    </form>
                </div>
            );
        }

        // ============== APP ==============
        function App() {
            const [authed, setAuthed] = useState(false);
            const [authChecking, setAuthChecking] = useState(true);

            useEffect(() => {
                const pw = localStorage.getItem(PW_STORAGE_KEY);
                if (!pw) { setAuthChecking(false); return; }
                // Verify password is still valid
                apiCall('designs', 'list')
                    .then(() => { setAuthed(true); setAuthChecking(false); })
                    .catch(() => { setAuthChecking(false); });
            }, []);

            if (authChecking) {
                return <div className="h-screen flex items-center justify-center text-gray-400 text-sm">Verbinding maken…</div>;
            }
            if (!authed) return <PasswordGate onAuthed={() => setAuthed(true)} />;

            return <Workspace onLogout={() => { localStorage.removeItem(PW_STORAGE_KEY); setAuthed(false); }} />;

                                const data = await fileToImageData(file);
                                setContent(prev => ({ ...prev, mainImage: data }));

                const useDarkMode = opts.darkMode ?? style.darkMode;

                const scale = 2;
                const phoneW_orig = style.phoneWidth;
                const m = computeMetrics({
                    platform: usePlatform, format: useFormat, content,
                    phoneW: phoneW_orig, sliderH: style.phoneHeight
                });
                const phoneH_orig = m.phoneHeight;
                const imgH_orig = m.imgHeight;

                const phoneW = phoneW_orig * scale;
                const phoneH = phoneH_orig * scale;
                const pad = style.padding * scale;
                const canvasW = phoneW + pad * 2;
                const canvasH = phoneH + pad * 2;

                const canvas = document.createElement('canvas');
                canvas.width = canvasW;
                canvas.height = canvasH;
                const ctx = canvas.getContext('2d');

                // Background
                if (style.bgType === 'solid') {
                    ctx.fillStyle = style.bgColor1;
                    ctx.fillRect(0, 0, canvasW, canvasH);
                } else if (style.bgType === 'gradient') {
                    const grd = ctx.createLinearGradient(0, 0, canvasW, canvasH);
                    grd.addColorStop(0, style.bgColor1);
                    grd.addColorStop(1, style.bgColor2);
                    ctx.fillStyle = grd;
                    ctx.fillRect(0, 0, canvasW, canvasH);
                } else {
                    ctx.clearRect(0, 0, canvasW, canvasH);
                }

                const phoneX = pad, phoneY = pad;
                const radius = 40 * scale;

                if (style.deviceFrame === 'shadow') {
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = 40 * scale;
                    ctx.shadowOffsetY = 20 * scale;
                }

                ctx.fillStyle = useDarkMode ? '#000' : '#fff';
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(phoneX, phoneY, phoneW, phoneH, radius);
                else ctx.rect(phoneX, phoneY, phoneW, phoneH);
                ctx.fill();

                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                if (style.deviceFrame === 'outline') {
                    ctx.lineWidth = 1.5 * scale;
                    ctx.strokeStyle = '#d4d4d8';
                    ctx.stroke();
                }

                // Clip to phone
                ctx.save();
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(phoneX, phoneY, phoneW, phoneH, radius);
                else ctx.rect(phoneX, phoneY, phoneW, phoneH);
                ctx.clip();

                const fontBold = (sz) => `600 ${sz * scale}px "Inter", sans-serif`;
                const fontReg = (sz) => `400 ${sz * scale}px "Inter", sans-serif`;

                // Status bar time
                ctx.fillStyle = (usePlatform.layout === 'story' || useDarkMode) ? '#fff' : '#000';
                ctx.font = fontBold(12);
                ctx.fillText('12:00', phoneX + 30 * scale, phoneY + 30 * scale);

                const safeX = phoneX + 20 * scale;
                const safeW = phoneW - 40 * scale;
                const currentY = phoneY + 50 * scale;

                const renderArgs = {
                    scale, phoneX, phoneY, phoneW, phoneH, safeX, safeW, currentY,
                    content, style, platform: usePlatform, darkMode: useDarkMode,
                    imgH: imgH_orig * scale, fontBold, fontReg
                };

                if (usePlatform.layout === 'feed-cta') await renderFeedCTA(ctx, renderArgs);
                else if (usePlatform.layout === 'feed-icons') await renderFeedIcons(ctx, renderArgs);
                else if (usePlatform.layout === 'story') await renderStory(ctx, renderArgs);

                ctx.restore();

                // Notch
                const notchW = 100 * scale, notchH = 25 * scale;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(phoneX + (phoneW - notchW) / 2, phoneY + 10 * scale, notchW, notchH, 12 * scale);
                else ctx.rect(phoneX + (phoneW - notchW) / 2, phoneY + 10 * scale, notchW, notchH);
                ctx.fill();

                return canvas;
            }, [platformId, formatId, content, style]);

                                    border: style.deviceFrame === 'outline' ? '1.5px solid #d4d4d8' : 'none'
                                }}>
                                <div className="absolute top-2 left-1/2 -translate-x-1/2 w-24 h-6 bg-black rounded-full z-20"></div>

                                {platform.layout === 'feed-cta' && <PreviewFeedCTA content={content} style={style} platform={platform} metrics={metrics} />}
                                {platform.layout === 'feed-icons' && <PreviewFeedIcons content={content} style={style} platform={platform} metrics={metrics} />}
                                {platform.layout === 'story' && <PreviewStory content={content} style={style} platform={platform} />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
